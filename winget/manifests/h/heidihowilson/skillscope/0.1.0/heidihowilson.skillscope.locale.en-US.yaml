ShortDescription: Fast, pluggable TUI for cross-scope skill-file inspection across every agentic-CLI harness.
Description: |-
  skillscope shows every SKILL.md file across every agentic-CLI harness
  on your machine — Claude Code, Codex CLI, Cursor, OpenCode,
  Antigravity — broken down by scope (user / project / project-local /
  plugin) and harness, with copy, move, and delete operations one
  keystroke away. Plugin-based architecture means new harnesses and
  visualisations drop in as single self-registering Go files.
