<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" width="480" height="140" role="img" aria-label="skillscope — ai slop edition">
  <title>skillscope — ai slop edition</title>
  <desc>A deliberately self-aware variant: a stylized wordmark with one letter highlighted in a brand color and a tongue-in-cheek "generated by an LLM" tagline.</desc>

  <!-- Wordmark with a deliberate "glitch": the second 'l' painted in Anthropic orange, and one extra glyph repeated to simulate AI duplication -->
  <text x="24" y="72" font-family="'JetBrains Mono', 'Fira Code', ui-monospace, Menlo, monospace" font-size="56" font-weight="700" fill="currentColor" letter-spacing="-1">
    ski<tspan fill="#D97757">l</tspan>lscope
  </text>

  <!-- Glitch artifact: a ghosted, half-transparent duplicate of one letter, offset slightly. Pure self-aware AI vibes. -->
  <text x="173" y="72" font-family="'JetBrains Mono', monospace" font-size="56" font-weight="700" fill="#10A37F" opacity="0.35" letter-spacing="-1">l</text>

  <!-- Tagline -->
  <text x="24" y="104" font-family="'JetBrains Mono', monospace" font-size="14" fill="currentColor" opacity="0.55" letter-spacing="0.5">
    ▌ generated by an LLM, lovingly
  </text>

  <!-- Tiny version-y annotation, terminal style -->
  <text x="24" y="124" font-family="'JetBrains Mono', monospace" font-size="11" fill="currentColor" opacity="0.35">
    $ <tspan fill="#10A37F" opacity="0.6">claude</tspan> <tspan fill="currentColor" opacity="0.55">draw a logo, go wild</tspan>  <tspan fill="currentColor" opacity="0.35">[exit 0]</tspan>
  </text>
</svg>
