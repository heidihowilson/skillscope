<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="skillscope">
  <title>skillscope</title>
  <desc>skillscope mark — dark reticle variant for light backgrounds.</desc>

  <circle cx="100" cy="100" r="88" fill="none" stroke="#1A202C" stroke-width="5"/>
  <circle cx="100" cy="100" r="76" fill="none" stroke="#1A202C" stroke-width="1" stroke-dasharray="2 6" opacity="0.45"/>

  <g stroke="#1A202C" stroke-width="4" stroke-linecap="round">
    <line x1="100" y1="6"   x2="100" y2="16"/>
    <line x1="100" y1="184" x2="100" y2="194"/>
    <line x1="6"   y1="100" x2="16"  y2="100"/>
    <line x1="184" y1="100" x2="194" y2="100"/>
  </g>

  <g stroke="#1A202C" stroke-width="1.5" opacity="0.35">
    <line x1="20"  y1="100" x2="72"  y2="100"/>
    <line x1="128" y1="100" x2="180" y2="100"/>
    <line x1="100" y1="20"  x2="100" y2="72"/>
    <line x1="100" y1="128" x2="100" y2="180"/>
  </g>

  <circle cx="100" cy="60"  r="10" fill="#D97757"/>
  <circle cx="140" cy="100" r="10" fill="#10A37F"/>
  <circle cx="100" cy="140" r="10" fill="#F54E00"/>
  <circle cx="60"  cy="100" r="10" fill="#FFCC00"/>

  <circle cx="100" cy="100" r="10" fill="#1A202C" opacity="0.25"/>
  <path d="M 100 90 A 10 10 0 0 0 100 110 Z" fill="#4285F4"/>
</svg>
