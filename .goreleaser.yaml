version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: skillscope
    main: ./cmd/skillscope
    binary: skillscope
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - name_template: >-
      {{- .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?(fix|bug)(\(.+\))??!?:.+$'
      order: 1
    - title: Docs
      regexp: '^.*?docs?(\(.+\))??!?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"

# Cross-repo publishing — both brews and scoops push to separate repos
# (heidihowilson/homebrew-tap, heidihowilson/scoop-bucket). The default
# GITHUB_TOKEN scope is the current repo only, so each needs its own PAT
# exposed as a secret. Uncomment the block once the corresponding secret
# is configured. The bucket / tap repos already exist; the initial v0.1.0
# manifests in both were bootstrapped by hand.
#
# brews:
#   - name: skillscope
#     repository:
#       owner: heidihowilson
#       name: homebrew-tap
#       branch: main
#       token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
#     homepage: https://github.com/heidihowilson/skillscope
#     description: Fast, pluggable TUI for cross-scope skill-file inspection.
#     license: MIT
#     test: |
#       system "#{bin}/skillscope --version"
#     skip_upload: auto
#
# scoops:
#   - name: skillscope
#     repository:
#       owner: heidihowilson
#       name: scoop-bucket
#       branch: main
#       token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
#     directory: bucket
#     homepage: https://github.com/heidihowilson/skillscope
#     description: Fast, pluggable TUI for cross-scope skill-file inspection.
#     license: MIT
#     skip_upload: auto
#
# winget: pushes a manifest PR to microsoft/winget-pkgs via a fork. Needs
# a PAT with `public_repo` scope exposed as WINGET_PKGS_GITHUB_TOKEN, and
# you must first fork microsoft/winget-pkgs to your own account
# (heidihowilson/winget-pkgs). Hand-curated v0.1.0 manifests live in
# winget/ as the source of truth until this is wired up.
#
# winget:
#   - name: skillscope
#     publisher: heidihowilson
#     license: MIT
#     license_url: https://github.com/heidihowilson/skillscope/blob/main/LICENSE
#     homepage: https://github.com/heidihowilson/skillscope
#     short_description: Fast, pluggable TUI for cross-scope skill-file inspection.
#     publisher_url: https://github.com/heidihowilson
#     publisher_support_url: https://github.com/heidihowilson/skillscope/issues
#     package_identifier: heidihowilson.skillscope
#     repository:
#       owner: heidihowilson
#       name: winget-pkgs
#       branch: "skillscope-v{{ .Version }}"
#       token: "{{ .Env.WINGET_PKGS_GITHUB_TOKEN }}"
#       pull_request:
#         enabled: true
#         base:
#           owner: microsoft
#           name: winget-pkgs
#           branch: master

release:
  prerelease: auto
  draft: false
  footer: |
    ---
    **Full changelog**: https://github.com/heidihowilson/skillscope/compare/{{ .PreviousTag }}...{{ .Tag }}

    Install:
    ```sh
    # via go install
    go install github.com/heidihowilson/skillscope/cmd/skillscope@{{ .Tag }}

    # or grab a binary above
    ```
